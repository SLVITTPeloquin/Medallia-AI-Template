# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - email-medallia-automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: emailmedalliacacr-eef6ceheayg9gder.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2C926F0665BF429196C9354E4A8297FB }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E0A975149B664E538C0F78DAE847CA20 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: emailmedalliacacr-eef6ceheayg9gder.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2C926F0665BF429196C9354E4A8297FB }}/medallia-ai-template:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BE217E51A03E4E41B69D13D0CA99DD05 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2638B0C5CDC5461FA542504AA780358B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BDBF138D410D4535A4FD927B9750140A }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'email-medallia-automation'
          slot-name: 'Production'
          images: 'emailmedalliacacr-eef6ceheayg9gder.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2C926F0665BF429196C9354E4A8297FB }}/medallia-ai-template:${{ github.sha }}'
          